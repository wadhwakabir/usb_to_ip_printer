[platformio]
default_envs = esp32-s3-n16r8

[env:esp32-s3-n16r8]
platform = platformio/espressif32
board = esp32-s3-n16r8
framework = arduino
monitor_speed = 115200
monitor_port = /dev/cu.usbmodem5B5E1124061
upload_speed = 921600
upload_port = /dev/cu.usbmodem5B5E1124061
board_build.partitions = partitions/default_16MB.csv
build_flags =
  -DRGB_LED_PIN=48
lib_deps =
  adafruit/Adafruit NeoPixel @ ^1.12.3

; If your onboard RGB LED does not blink, your board may use GPIO38 instead.
; Change the build flag above to: -DRGB_LED_PIN=38

[env:native-tests]
platform = native
test_framework = unity
test_build_src = no
build_flags =
  -std=gnu++17
