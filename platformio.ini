[platformio]
default_envs = esp32-s3-n16r8

[env:esp32-s3-n16r8]
platform = platformio/espressif32
board = esp32-s3-n16r8
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = partitions/default_16MB.csv
build_flags =
  -DRGB_LED_PIN=48
lib_deps =
  adafruit/Adafruit NeoPixel @ ^1.12.3

; PlatformIO auto-detects the serial port.  To pin a specific device
; (useful when multiple USB serial devices are attached) uncomment and set:
;   monitor_port = /dev/cu.usbmodem0000000001
;   upload_port  = /dev/cu.usbmodem0000000001
; On Linux the typical path is /dev/ttyUSB0 or /dev/ttyACM0.
;
; If your onboard RGB LED does not blink, your board may use GPIO38 instead.
; Change the build flag above to: -DRGB_LED_PIN=38

[env:native-tests]
platform = native
test_framework = unity
test_build_src = no
build_flags =
  -std=gnu++17
